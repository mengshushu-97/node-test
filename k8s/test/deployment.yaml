apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-test
  namespace: test
  labels:
    app.kubernetes.io/name: node-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: node-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: node-test
          image: harbor.local/test/node-test:0853592242a3023ec705a2b3f3f740d6f381c271
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SERVICE_NAME
              value: node-test
            - name: APP_ENV
              value: test
            - name: PORT
              value: "3000"
            - name: JAVA_SERVICE_URL
              value: http://java-test:8080
            - name: AGENT_SERVICE_URL
              value: http://agent-test:8000
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=test,service.namespace=demo
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: node-test
  namespace: test
  labels:
    app.kubernetes.io/name: node-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: node-test
  ports:
    - name: http
      port: 3000
      targetPort: http
