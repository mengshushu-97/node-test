name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-prod to confirm production deployment
        required: true

concurrency:
  group: node-test-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy node-test to prod
    if: ${{ github.event.inputs.confirm == 'deploy-prod' }}
    runs-on:
      - self-hosted
      - k3s
      - prod
    environment: production
    env:
      APP_NAME: node-test
      CONTAINER_NAME: node-test
      NAMESPACE: prod
      MANIFEST_DIR: k8s/prod
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight
        env:
          CHECK_NAMESPACE: prod
        run: ./scripts/check-runner-prereqs.sh

      - name: Test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:20-bookworm-slim \
            sh -lc "npm ci && npm test"

      - name: Build local image and deploy to k3s
        run: ./scripts/deploy-local-k3s.sh
