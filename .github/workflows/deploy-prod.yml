name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-prod to confirm production deployment
        required: true

concurrency:
  group: node-test-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy node-test to prod
    if: ${{ github.event.inputs.confirm == 'deploy-prod' }}
    runs-on:
      - self-hosted
      - k3s
      - prod
    environment: production
    env:
      APP_NAME: node-test
      CONTAINER_NAME: node-test
      NAMESPACE: prod
      MANIFEST_FILE: k8s/prod/deployment.yaml
      HARBOR_REGISTRY: harbor.local
      HARBOR_PROJECT: prod
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight
        env:
          CHECK_NAMESPACE: prod
        run: ./scripts/check-runner-prereqs.sh

      - name: Test
        run: |
          NPM_CACHE_DIR="$HOME/.cache/npm/node-test"
          mkdir -p "$NPM_CACHE_DIR"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$NPM_CACHE_DIR:/tmp/.npm" \
            -w /workspace \
            -e HOME=/tmp \
            node:20-bookworm-slim \
            sh -lc "npm ci --cache /tmp/.npm --prefer-offline --registry=https://registry.npmmirror.com && npm test"

      - name: Build and push Harbor image
        run: ./scripts/build-push-harbor.sh

      - name: Update GitOps manifest
        env:
          IMAGE: harbor.local/prod/node-test:${{ github.sha }}
        run: ./scripts/update-k8s-image.sh

      - name: Commit GitOps manifest
        run: |
          if git diff --quiet -- "$MANIFEST_FILE"; then
            echo "No manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_FILE"
          git commit -m "chore(cicd): deploy $APP_NAME $IMAGE_TAG [skip ci]"
          git pull --rebase
          git push
