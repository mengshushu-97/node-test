name: Deploy Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/test/**'
      - 'k8s/prod/**'
      - 'argocd/**'
  workflow_dispatch:

concurrency:
  group: node-test-test
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy node-test
    runs-on:
      - self-hosted
      - k3s
      - test
    env:
      APP_NAME: node-test
      CONTAINER_NAME: node-test
      NAMESPACE: test
      MANIFEST_FILE: k8s/test/deployment.yaml
      HARBOR_REGISTRY: harbor.local
      HARBOR_PROJECT: test
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight
        env:
          CHECK_NAMESPACE: test
        run: ./scripts/check-runner-prereqs.sh

      - name: Test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:20-bookworm-slim \
            sh -lc "npm ci && npm test"

      - name: Build and push Harbor image
        run: ./scripts/build-push-harbor.sh

      - name: Update GitOps manifest
        env:
          IMAGE: harbor.local/test/node-test:${{ github.sha }}
        run: ./scripts/update-k8s-image.sh

      - name: Commit GitOps manifest
        run: |
          if git diff --quiet -- "$MANIFEST_FILE"; then
            echo "No manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_FILE"
          git commit -m "chore(cicd): deploy $APP_NAME $IMAGE_TAG [skip ci]"
          git pull --rebase
          git push
